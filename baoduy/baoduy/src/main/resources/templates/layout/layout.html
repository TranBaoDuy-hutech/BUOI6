<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1e2d45;
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --text: #e2e8f0;
            --text-muted: #64748b;
        }

        * { font-family: 'Sora', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
        }

        /* Navbar */
        .main-navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .navbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .navbar-brand .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .navbar-brand span {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .nav-link-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 1rem;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-link-item:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-link-item.active {
            background: rgba(59,130,246,0.15);
            color: #93c5fd;
        }

        .navbar-badge {
            font-size: 0.65rem;
            padding: 0.15rem 0.45rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 999px;
            color: #fff;
            font-weight: 600;
        }

        /* Main content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Footer */
        .main-footer {
            border-top: 1px solid var(--border);
            padding: 1.25rem 0;
            margin-top: 4rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .main-footer span {
            color: #f43f5e;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="main-navbar">
    <div class="navbar-inner">
        <a href="/products" class="navbar-brand">
            <div class="logo-icon">🛒</div>
            <span>Product Manager</span>
        </a>

        <div class="nav-links">
            <a href="/products" class="nav-link-item active">
                📦 Sản phẩm
                <span class="navbar-badge">v1</span>
            </a>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="main-content">
    <div layout:fragment="content"></div>
</div>

<!-- Footer -->
<div class="main-footer">
    Made with <span>♥</span> · Product Manager &copy; 2025
</div>

</body>
</html>
