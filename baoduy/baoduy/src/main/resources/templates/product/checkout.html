<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout/layout">
<head>
    <title>Đặt hàng</title>
    <style>
        .checkout-page { padding: 2rem; color: var(--text); max-width: 700px; }
        .page-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted);
                margin-bottom: 0.4rem; font-weight: 600; }
        input[type=text], input[type=tel] {
            width: 100%; padding: 0.6rem 1rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.9rem; }
        input:focus { border-color: var(--accent); outline: none; }
        .order-summary { background: var(--surface); border: 1px solid var(--border);
                          border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .summary-row { display: flex; justify-content: space-between;
                       padding: 0.4rem 0; font-size: 0.875rem;
                       border-bottom: 1px solid var(--border); }
        .summary-row:last-child { border-bottom: none; font-weight: 700;
                                   color: #34d399; font-size: 1rem; }
        .btn-place { padding: 0.75rem 2.5rem; background: var(--accent);
                     color: #fff; border: none; border-radius: 8px;
                     font-size: 1rem; font-weight: 700; cursor: pointer; }
        .btn-place:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="checkout-page">
        <h3 class="page-title">📦 Đặt hàng</h3>

        <!-- Order summary -->
        <div class="order-summary">
            <div class="summary-row" th:each="item : ${cartItems}">
                <span th:text="${item.name} + ' × ' + ${item.quantity}"></span>
                <span th:text="${#numbers.formatInteger(item.total, 0, 'COMMA')} + ' ₫'"
                      style="color:#fbbf24;font-family:monospace;"></span>
            </div>
            <div class="summary-row">
                <span>Tổng cộng</span>
                <span th:text="${#numbers.formatInteger(total, 0, 'COMMA')} + ' ₫'"></span>
            </div>
        </div>

        <!-- Checkout form -->
        <form th:action="@{/checkout}" method="post" th:object="${order}">
            <div class="form-group">
                <label>Họ tên</label>
                <input type="text" th:field="*{customerName}" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="tel" th:field="*{phone}" placeholder="0901234567" required>
            </div>
            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" th:field="*{address}" placeholder="123 Đường ABC, TP.HCM" required>
            </div>
            <button type="submit" class="btn-place">✅ Xác nhận đặt hàng</button>
        </form>
    </div>
</div>
</body>
</html>
