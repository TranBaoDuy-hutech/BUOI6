<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">🛒 Form Sản Phẩm</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/products/save}" method="post"
                  enctype="multipart/form-data" th:object="${product}">

                <input type="hidden" th:field="*{id}"/>

                <!-- Tên sản phẩm -->
                <div class="mb-3">
                    <label class="form-label">Tên sản phẩm</label>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Nhập tên sản phẩm">
                    <div class="text-danger" th:errors="*{name}"></div>
                </div>

                <!-- Giá -->
                <div class="mb-3">
                    <label class="form-label">Giá</label>
                    <input type="number" class="form-control" th:field="*{price}" placeholder="Nhập giá">
                    <div class="text-danger" th:errors="*{price}"></div>
                </div>

                <!-- Ảnh -->
                <div class="mb-3">
                    <label class="form-label">Hình ảnh</label>
                    <input type="file" name="file" class="form-control">
                </div>

                <!-- Danh mục -->
                <div class="mb-3">
                    <label class="form-label">Danh mục</label>
                    <select class="form-select" th:field="*{categoryId}">
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}">
                        </option>
                    </select>
                </div>

                <!-- Nút -->
                <div class="d-flex justify-content-between">
                    <a href="/products" class="btn btn-secondary">⬅ Quay lại</a>
                    <button type="submit" class="btn btn-success px-4">💾 Lưu sản phẩm</button>
                </div>

            </form>

        </div>
    </div>

</div>
</html>
