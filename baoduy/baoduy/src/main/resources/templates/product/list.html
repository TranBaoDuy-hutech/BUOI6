<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout/layout">

<head>
    <title>Danh sách sản phẩm</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1e2d45;
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --success: #10b981;
            --text: #e2e8f0;
            --text-muted: #64748b;
        }

        body, .product-page * {
            font-family: 'Sora', sans-serif;
        }

        .product-page {
            background: var(--bg);
            min-height: 100vh;
            padding: 2rem;
            color: var(--text);
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .page-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .page-title .icon {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.4rem;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: #fff;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(59,130,246,0.35);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59,130,246,0.5);
            color: #fff;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar input,
        .filter-bar select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: 'Sora', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            border-color: var(--accent);
        }

        .filter-bar select option {
            background: var(--surface2);
            color: var(--text);
        }

        .btn-search {
            padding: 0.5rem 1.2rem;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            font-family: 'Sora', sans-serif;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(59,130,246,0.3);
        }

        .btn-search:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(59,130,246,0.45);
        }

        /* Table */
        .table-wrap {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--surface2);
        }

        thead th {
            padding: 1rem 1.25rem;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s ease;
            animation: fadeUp 0.3s ease both;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }

        tbody tr:nth-child(1) { animation-delay: 0.04s; }
        tbody tr:nth-child(2) { animation-delay: 0.08s; }
        tbody tr:nth-child(3) { animation-delay: 0.12s; }
        tbody tr:nth-child(4) { animation-delay: 0.16s; }
        tbody tr:nth-child(5) { animation-delay: 0.20s; }
        tbody tr:nth-child(n+6) { animation-delay: 0.24s; }

        td {
            padding: 1rem 1.25rem;
            font-size: 0.875rem;
            vertical-align: middle;
        }

        .cell-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }

        .cell-name { font-weight: 600; color: var(--text); }

        .cell-price {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: #34d399;
            text-align: right;
            white-space: nowrap;
        }

        .cell-image { text-align: center; }

        .product-img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }

        .product-img:hover { transform: scale(1.08); }

        .img-placeholder {
            width: 80px;
            height: 60px;
            background: var(--surface2);
            border-radius: 8px;
            border: 1px dashed var(--border);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.25rem;
        }

        .cell-category { text-align: center; }

        .badge-cat {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .badge-laptop {
            background: rgba(59,130,246,0.15);
            color: #93c5fd;
            border: 1px solid rgba(59,130,246,0.3);
        }

        .badge-phone {
            background: rgba(168,85,247,0.15);
            color: #d8b4fe;
            border: 1px solid rgba(168,85,247,0.3);
        }

        .cell-actions {
            text-align: center;
            white-space: nowrap;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.85rem;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            margin: 0 0.2rem;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            border: none;
        }

        .btn-edit {
            background: rgba(245,158,11,0.12);
            color: #fbbf24;
            border: 1px solid rgba(245,158,11,0.3);
        }

        .btn-edit:hover {
            background: rgba(245,158,11,0.25);
            color: #fde68a;
            transform: translateY(-1px);
        }

        .btn-delete {
            background: rgba(244,63,94,0.12);
            color: #fb7185;
            border: 1px solid rgba(244,63,94,0.3);
        }

        .btn-delete:hover {
            background: rgba(244,63,94,0.25);
            color: #fda4af;
            transform: translateY(-1px);
        }

        .btn-cart {
            background: rgba(16,185,129,0.12);
            color: #34d399;
            border: 1px solid rgba(16,185,129,0.3) !important;
        }

        .btn-cart:hover {
            background: rgba(16,185,129,0.25);
            color: #6ee7b7;
            transform: translateY(-1px);
        }

        /* Quantity input */
        .qty-input {
            width: 48px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 0.3rem 0.4rem;
            font-size: 0.8rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            margin-top: 1.75rem;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            background: var(--surface2);
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            font-family: 'Sora', sans-serif;
        }

        .page-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .page-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
        }

        .page-btn.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* Cart inline form */
        .cart-form {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .text-center { text-align: center; }
        .text-right  { text-align: right; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
<div layout:fragment="content">
    <div class="product-page">

        <!-- ── Header ── -->
        <div class="page-header">
            <h3 class="page-title">
                <span class="icon">▣</span> Danh sách sản phẩm
            </h3>
            <a th:if="${isAdmin}" th:href="@{/products/create}" class="btn-add">
                ＋ Thêm sản phẩm
            </a>
        </div>

        <!-- ── Câu 1 + 3 + 4: Search / Sort / Filter ── -->
        <form th:action="@{/products}" method="get" class="filter-bar">
            <!-- Câu 1: tìm theo tên -->
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="🔍 Tìm theo tên sản phẩm...">

            <!-- Câu 4: lọc category -->
            <select name="categoryId">
                <option value="0">-- Tất cả danh mục --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == categoryId}">
                </option>
            </select>

            <!-- Câu 3: sắp xếp giá -->
            <select name="sortBy">
                <option value=""     th:selected="${sortBy == ''}">-- Sắp xếp --</option>
                <option value="asc"  th:selected="${sortBy == 'asc'}">Giá tăng dần ↑</option>
                <option value="desc" th:selected="${sortBy == 'desc'}">Giá giảm dần ↓</option>
            </select>

            <button type="submit" class="btn-search">🔍 Tìm kiếm</button>
        </form>

        <!-- ── Table ── -->
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th class="text-center">ID</th>
                    <th>Tên sản phẩm</th>
                    <th class="text-right">Giá</th>
                    <th class="text-center">Hình ảnh</th>
                    <th class="text-center">Danh mục</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${products}">
                    <td class="cell-id" th:text="${p.id}"></td>

                    <td class="cell-name" th:text="${p.name}"></td>

                    <td class="cell-price">
                        <span th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + ' ₫'"></span>
                    </td>

                    <td class="cell-image">
                        <img th:if="${p.image != null}"
                             th:src="@{/images/{img}(img=${p.image})}"
                             class="product-img"
                             th:alt="${p.name}">
                        <div th:if="${p.image == null}" class="img-placeholder">🖼</div>
                    </td>

                    <td class="cell-category">
                        <span th:if="${p.categoryId == 1}" class="badge-cat badge-laptop">💻 Laptop</span>
                        <span th:if="${p.categoryId != 1}" class="badge-cat badge-phone">📱 Điện thoại</span>
                    </td>

                    <td class="cell-actions">
                        <!-- Câu 5: Thêm vào giỏ hàng -->
                        <form th:action="@{/cart/add}" method="post" class="cart-form">
                            <input type="hidden" name="productId" th:value="${p.id}">
                            <input type="number" name="quantity"
                                   value="1" min="1" max="99"
                                   class="qty-input">
                            <button type="submit" class="btn-action btn-cart">🛒 Mua</button>
                        </form>

                        <!-- CRUD: chỉ Admin -->
                        <span th:if="${isAdmin}">
                            <a th:href="@{/products/edit/{id}(id=${p.id})}"
                               class="btn-action btn-edit">✏ Sửa</a>
                            <a th:href="@{/products/delete/{id}(id=${p.id})}"
                               class="btn-action btn-delete">✕ Xóa</a>
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- ── Câu 2: Pagination ── -->
        <div class="pagination" th:if="${totalPages > 0}">

            <!-- Previous -->
            <a class="page-btn"
               th:classappend="${currentPage == 0} ? ' disabled'"
               th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy}, page=${currentPage - 1})}">
                ← Trước
            </a>

            <!-- Page numbers -->
            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a class="page-btn"
                   th:classappend="${i == currentPage} ? ' active'"
                   th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy}, page=${i})}"
                   th:text="${i + 1}">
                </a>
            </th:block>

            <!-- Next -->
            <a class="page-btn"
               th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
               th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy}, page=${currentPage + 1})}">
                Tiếp →
            </a>

        </div>

    </div>
</div>
</body>
</html>
