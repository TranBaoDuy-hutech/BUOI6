<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="text-primary">📦 Danh sách sản phẩm</h3>
        <a href="/products/create" class="btn btn-success">
            ➕ Thêm sản phẩm
        </a>
    </div>

    <table class="table table-bordered table-hover align-middle text-center">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Hình ảnh</th>
            <th>Danh mục</th>
            <th>Thao tác</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>

            <td class="text-start" th:text="${p.name}"></td>

            <td class="text-danger fw-bold"
                th:text="${p.price} + ' đ'"></td>

            <td>
                <img th:src="@{'/images/' + ${p.image}}"
                     class="img-thumbnail"
                     style="width:90px; height:70px; object-fit:cover;">
            </td>

            <td>
                <span class="badge bg-info"
                      th:text="${p.categoryId == 1 ? 'Laptop' : 'Điện thoại'}">
                </span>
            </td>

            <td>
                <a th:href="@{'/products/edit/' + ${p.id}}"
                   class="btn btn-warning btn-sm">Sửa</a>

                <a th:href="@{'/products/delete/' + ${p.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                    Xóa
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</html>
