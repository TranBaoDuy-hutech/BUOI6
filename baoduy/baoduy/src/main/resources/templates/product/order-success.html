<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout/layout">
<head><title>Đặt hàng thành công</title></head>
<body>
<div layout:fragment="content">
    <div style="text-align:center;padding:4rem;color:var(--text);">
        <div style="font-size:4rem;">✅</div>
        <h2 style="font-size:1.75rem;font-weight:700;margin:1rem 0;">Đặt hàng thành công!</h2>
        <p style="color:var(--text-muted);">
            Mã đơn hàng của bạn: <strong th:text="'#' + ${orderId}"
                                         style="color:#34d399;"></strong>
        </p>
        <a th:href="@{/products}"
           style="display:inline-block;margin-top:1.5rem;padding:0.6rem 1.5rem;
                  background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;
                  font-weight:600;">
            ← Tiếp tục mua sắm
        </a>
    </div>
</div>
</body>
</html>
